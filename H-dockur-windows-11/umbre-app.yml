manifestVersion: 1
id: H-dockur-windows-xp
name: Windows XP
tagline: Run Windows 11 inside a Docker container
icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/windows-11.png
category: Windows
version: "1.0.0"
port: 8006

description: >-
  This application runs a virtual machine with Windows 11 using the dockurr/windows container.
  Useful for nostalgia, testing, or compatibility with old software.


  ⚠️ Minimum Requirements

  CPU: x86_64 processor (Intel or AMD)

  RAM: At least 4 GB

  Disk: Starts small but dynamically expands up to 64 GB


  The main interface is available on port 8006 (through the browser),
  and also supports RDP connections on port 3389.


  ✅ File sharing with your Umbrel
  
 
  Open File Explorer inside Windows and go to '\\host.lan\Data'
  
  This maps to your Umbrel's downloads folder. Use this to exchange files between your Umbrel and the virtual machine.


  ⚠️ Your device must support virtualization and enabled in the BIOS/UEFI!

  
